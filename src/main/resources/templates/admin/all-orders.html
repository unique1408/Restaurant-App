<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>All Orders</title>

	<style>
		body {
			font-family: Arial, Helvetica, sans-serif;
			background-color: #f4f6f9;
			margin: 0;
			padding: 30px;
		}

		h2 {
			text-align: center;
			margin-bottom: 25px;
			color: #333;
		}

		table {
			width: 90%;
			margin: auto;
			border-collapse: collapse;
			background: white;
			box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
		}

		th {
			background: #2c3e50;
			color: white;
			padding: 12px;
			text-align: center;
		}

		td {
			padding: 12px;
			text-align: center;
			border-bottom: 1px solid #ddd;
		}

		tr:hover {
			background: #f1f1f1;
		}

		a {
			text-decoration: none;
			background: #3498db;
			color: white;
			padding: 6px 12px;
			border-radius: 4px;
			font-size: 14px;
		}

		a:hover {
			background: #2980b9;
		}
	</style>

</head>

<body>

	<h2>All Orders</h2>

	<table>

		<tr>
			<th>Order ID</th>
			<th>Customer</th>
			<th>Total</th>
			<th>Status</th>
			<th>Action</th>
		</tr>

		<tr th:each="order : ${orders}">

			<td th:text="${order.id}"></td>
			<td th:text="${order.user.username}"></td>
			<td>₹ <span th:text="${order.totalAmount}"></span></td>
			<td th:text="${order.status}"></td>

			<td>
				<a th:href="@{/admin/orders/{id}(id=${order.id})}">View</a>
			</td>

		</tr>

	</table>

</body>

</html>
