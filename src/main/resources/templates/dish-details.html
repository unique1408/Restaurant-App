<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Dish Details</title>

	<style>
		body {
			font-family: Arial, Helvetica, sans-serif;
			background: #f4f4f4;
		}

		.container {
			width: 70%;
			margin: auto;
			margin-top: 40px;
		}

		.card {
			display: flex;
			background: white;
			border-radius: 10px;
			box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
			overflow: hidden;
		}

		.image-section {
			width: 40%;
		}

		.image-section img {
			width: 100%;
			height: 100%;
			object-fit: cover;
		}

		.details {
			padding: 30px;
			width: 60%;
		}

		.details h1 {
			margin-bottom: 10px;
		}

		.category {
			color: #777;
			margin-bottom: 10px;
		}

		.price {
			color: #e63946;
			font-size: 24px;
			font-weight: bold;
			margin-bottom: 15px;
		}

		.description {
			margin-bottom: 20px;
		}

		.btn {
			padding: 10px 20px;
			border: none;
			background: #28a745;
			color: white;
			border-radius: 5px;
			cursor: pointer;
		}

		.btn:hover {
			background: #218838;
		}

		.back-btn {
			margin-top: 20px;
			display: inline-block;
			text-decoration: none;
			color: white;
			background: #333;
			padding: 8px 15px;
			border-radius: 5px;
		}
	</style>

</head>

<body>

	<div class="container">

		<div class="card">

			<div class="image-section">
				<img th:src="@{${dish.imagePath}}" alt="Dish Image">
			</div>

			<div class="details">

				<h1 th:text="${dish.name}">Dish Name</h1>

				<p class="category">
					Category: <span th:text="${dish.category}"></span>
				</p>

				<p class="price">
					₹ <span th:text="${dish.price}"></span>
				</p>

				<p class="description" th:text="${dish.description}">
					Dish description
				</p>

				<form th:action="@{/cart/add/{id}(id=${dish.id})}" method="post">

				<input type="hidden"
				       th:name="${_csrf.parameterName}"
				       th:value="${_csrf.token}" />

				<button class="btn" type="submit">Add to Cart</button>

				</form>

				<a href="/menu" class="back-btn">Back to Menu</a>

			</div>

		</div>

	</div>

</body>

</html>
